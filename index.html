<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <!--
    viewport-fit=cover: lets content extend into iPhone notch/safe areas.
    user-scalable=no:   disables pinch-zoom so Unity gets all touch events.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>TaakmeesterController</title>

  <style>
    /* ── Reset ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /*
      Use the "large" viewport unit (lvh) so the layout fills the full
      browser chrome height on mobile, then fall back to 100vh.
      overflow:hidden stops iOS rubber-band scrolling from showing a gap.
    */
    html, body {
      width: 100%;
      height: 100%;
      height: 100lvh; /* modern mobile: ignores collapsing address bar */
      background: #000;
      overflow: hidden;
      touch-action: none;      /* Unity handles its own touch events */
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── Canvas wrapper ─────────────────────────────────────────────────
       The wrapper fills the full viewport. The canvas inside is sized
       by JS to the largest rectangle that fits while keeping the Unity
       build's original aspect ratio — centered with black bars if needed.
       Remove the JS resize call below if you'd rather have Unity's
       Canvas Scaler handle everything (full bleed, no bars).
    ─────────────────────────────────────────────────────────────────── */
    #unity-wrapper {
      position: fixed;
      inset: 0;
      /* Respect iPhone notch / Android cutout */
      padding: env(safe-area-inset-top)
               env(safe-area-inset-right)
               env(safe-area-inset-bottom)
               env(safe-area-inset-left);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #unity-canvas {
      /* Start invisible; JS makes it visible after the first frame. */
      display: block;
      /* These are overridden by the JS resizer on every resize event. */
      width: 100%;
      height: 100%;
      background: #000;
    }

    /* ── Loading overlay ────────────────────────────────────────────────
       Covers the canvas while Unity boots. Fades out on first frame.
    ─────────────────────────────────────────────────────────────────── */
    #unity-loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: #111;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      transition: opacity 0.5s ease;
      z-index: 10;
    }

    #unity-loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #unity-product-name {
      font-size: clamp(1rem, 4vw, 1.6rem);
      font-weight: 600;
      letter-spacing: 0.05em;
      opacity: 0.85;
    }

    /* Progress track */
    #unity-progress-track {
      width: min(280px, 60vw);
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      overflow: hidden;
    }

    #unity-progress-bar {
      height: 100%;
      width: 0%;
      background: #fff;
      border-radius: 999px;
      transition: width 0.2s ease;
    }

    #unity-progress-label {
      font-size: 0.75rem;
      opacity: 0.5;
      letter-spacing: 0.1em;
    }
  </style>
</head>

<body>

  <!-- Canvas wrapper -->
  <div id="unity-wrapper">
    <canvas id="unity-canvas"></canvas>
  </div>

  <!-- Loading screen -->
  <div id="unity-loading-overlay">
    <div id="unity-product-name">TaakmeesterController</div>
    <div id="unity-progress-track">
      <div id="unity-progress-bar"></div>
    </div>
    <div id="unity-progress-label">LOADING…</div>
  </div>

  <!-- Unity loader (path injected by Unity build pipeline) -->
  <script src=""></script>

  <script>
    'use strict';

    // ── Config ────────────────────────────────────────────────────────────
    var buildUrl = "Build";

    var config = {
      dataUrl:             buildUrl + "/TaskmasterController_webgl.data",
      frameworkUrl:        buildUrl + "/TaskmasterController_webgl.framework.js",
      codeUrl:             buildUrl + "/TaskmasterController_webgl.wasm",
      streamingAssetsUrl:  "StreamingAssets",
      companyName:         "DefaultCompany",
      productName:         "TaakmeesterController",
      productVersion:      "1.0",
    };

    // ── Elements ──────────────────────────────────────────────────────────
    var canvas  = document.getElementById("unity-canvas");
    var overlay = document.getElementById("unity-loading-overlay");
    var bar     = document.getElementById("unity-progress-bar");
    var label   = document.getElementById("unity-progress-label");

    // ── Canvas resizer ────────────────────────────────────────────────────
    //
    // Strategy: fill the wrapper entirely (full bleed).
    // Unity's Canvas Scaler handles the actual UI layout.
    //
    // If you prefer letterboxed/pillarboxed rendering to preserve a fixed
    // aspect ratio, replace the body of resizeCanvas() with the commented
    // "Letterbox / pillarbox" block below.
    //
    function resizeCanvas() {
      var wrapper = document.getElementById("unity-wrapper");
      var w = wrapper.clientWidth;
      var h = wrapper.clientHeight;

      // ── Full-bleed (recommended — let Unity Canvas Scaler handle UI) ──
      canvas.style.width  = w + "px";
      canvas.style.height = h + "px";

      /*
      // ── Letterbox / pillarbox (fixed aspect ratio) ────────────────────
      var TARGET_RATIO = 960 / 540;
      var windowRatio  = w / h;
      var cw, ch;
      if (windowRatio > TARGET_RATIO) {
        // Window is wider than needed — pillarbox
        ch = h;
        cw = Math.round(h * TARGET_RATIO);
      } else {
        // Window is taller than needed — letterbox
        cw = w;
        ch = Math.round(w / TARGET_RATIO);
      }
      canvas.style.width  = cw + "px";
      canvas.style.height = ch + "px";
      */
    }

    // Run once immediately and again on every resize / orientation change.
    resizeCanvas();
    window.addEventListener("resize",            resizeCanvas);
    window.addEventListener("orientationchange", resizeCanvas);

    // ── Boot Unity ────────────────────────────────────────────────────────
    createUnityInstance(canvas, config, function onProgress(progress) {
      bar.style.width = (progress * 100) + "%";
      if (progress >= 1) {
        label.textContent = "STARTING…";
      }
    })
    .then(function onReady(unityInstance) {
      // Fade out and remove the loading overlay
      overlay.classList.add("hidden");
      overlay.addEventListener("transitionend", function() {
        overlay.remove();
      }, { once: true });
    })
    .catch(function onError(message) {
      label.textContent = "ERROR";
      console.error("Unity WebGL failed to start:", message);
      alert("Failed to start: " + message);
    });
  </script>

</body>
</html>
